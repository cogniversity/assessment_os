name: Publish Docker images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. 1.0.0 or latest)"
        required: true
        default: "latest"

env:
  REGISTRY_USER: cogniverse
  API_IMAGE: assessment-os-api
  WEB_IMAGE: assessment-os-web

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            REF="${GITHUB_REF#refs/tags/}"
            echo "tag=${REF#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.REGISTRY_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY_USER }}/${{ env.API_IMAGE }}:${{ steps.vars.outputs.tag }}
            ${{ env.REGISTRY_USER }}/${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY_USER }}/${{ env.WEB_IMAGE }}:${{ steps.vars.outputs.tag }}
            ${{ env.REGISTRY_USER }}/${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Published:"
          echo "  ${{ env.REGISTRY_USER }}/${{ env.API_IMAGE }}:${{ steps.vars.outputs.tag }}"
          echo "  ${{ env.REGISTRY_USER }}/${{ env.WEB_IMAGE }}:${{ steps.vars.outputs.tag }}"
